name: Build ESP32-S3 Octal Camera Firmware

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout MicroPython Base
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/micropython'
        fetch-depth: 0

    - name: Checkout Custom Camera Driver
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/micropython-camera-driver'
        path: micropython-camera-driver

    - name: Bring Berkeley DB Dependency (BTree)
      uses: actions/checkout@v4
      with:
        repository: 'pfalcon/berkeley-db-1.xx'
        path: btree-temp

    - name: Bring MicroPython Lib Dependency
      uses: actions/checkout@v4
      with:
        repository: 'micropython/micropython-lib'
        path: lib/micropython-lib

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git pkg-config cmake ninja-build

    - name: Cache ESP-IDF Tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.espressif
        key: ${{ runner.os }}-esp-idf-v5.3-${{ hashFiles('ports/esp32/Makefile') }}

    - name: Install ESP-IDF Tools
      run: |
        cd ports/esp32
        if [ ! -d "esp-idf" ] || [ -z "$(ls -A esp-idf 2>/dev/null)" ]; then
          echo "Clonando ESP-IDF v5.3 de forma manual..."
          rm -rf esp-idf
          git clone -b v5.3 --recursive https://github.com/espressif/esp-idf.git esp-idf
        fi
        ./esp-idf/install.sh

    - name: Build mpy-cross
      run: |
        make -C mpy-cross

    - name: Patch Framework (Fix Bootloader & JPEG Conflict)
      run: |
        find . -name "CMakeLists.txt" | grep "esp_jpeg" | xargs -I {} sh -c '
          if ! grep -q "BOOTLOADER_BUILD" {}; then
            echo "if(NOT BOOTLOADER_BUILD)" > {}.tmp
            cat {} >> {}.tmp
            echo "endif()" >> {}.tmp
            mv {}.tmp {}
            echo "Parcheado bootloader en: {}"
          fi
        '

    - name: Copy Camera Driver to Expected Path
      run: |
        rm -rf "${{ github.workspace }}/ports/esp32/main/camera_modules"
        mkdir -p "${{ github.workspace }}/ports/esp32/main/camera_modules"
        cp -r "${{ github.workspace }}/micropython-camera-driver/src/." "${{ github.workspace }}/ports/esp32/main/camera_modules"

    - name: Prepare and Verify Berkeley DB Path
      run: |
        rm -rf lib/berkeley-db-1.xx
        mkdir -p lib/berkeley-db-1.xx
        cp -r btree-temp/. lib/berkeley-db-1.xx/

    - name: Bypass CMake Submodule Checks and Force Compile Flags
      run: |
        # 1. Bypass para berkeley-db en extmod.cmake
        if [ -f "extmod/extmod.cmake" ]; then
          sed -i 's/message(FATAL_ERROR.*berkeley-db.*)/message(STATUS "Bypassed berkeley-db error")/g' extmod/extmod.cmake
          sed -i 's/message(SEND_ERROR.*berkeley-db.*)/message(STATUS "Bypassed berkeley-db error")/g' extmod/extmod.cmake
          sed -i '116s/message(FATAL_ERROR/message(STATUS/g' extmod/extmod.cmake 2>/dev/null || true
          
          echo "=== Creando cabecera de parche completa para CIRCLEQ ==="
          echo "#ifndef _ESP32_FIX_MACROS_H_" > "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define _ESP32_FIX_MACROS_H_" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#include <sys/types.h>" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#include <stdint.h>" >> "${{ github.workspace }}/esp32_fix_macros.h"
          
          echo "#ifndef CIRCLEQ_ENTRY" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_ENTRY(type) struct { struct type *cqe_next; struct type *cqe_prev; }" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef CIRCLEQ_HEAD" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_HEAD(name, type) struct name { struct type *cqh_first; struct type *cqh_last; }" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          
          echo "#ifndef CIRCLEQ_INIT" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_INIT(head) do { (head)->cqh_first = (void *)(head); (head)->cqh_last = (void *)(head); } while (0)" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef CIRCLEQ_INSERT_HEAD" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_INSERT_HEAD(head, elm, field) do { (elm)->field.cqe_next = (head)->cqh_first; (elm)->field.cqe_prev = (void *)(head); if ((head)->cqh_last == (void *)(head)) (head)->cqh_last = (elm); else (head)->cqh_first->field.cqe_prev = (elm); (head)->cqh_first = (elm); } while (0)" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef CIRCLEQ_INSERT_TAIL" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_INSERT_TAIL(head, elm, field) do { (elm)->field.cqe_next = (void *)(head); (elm)->field.cqe_prev = (head)->cqh_last; if ((head)->cqh_first == (void *)(head)) (head)->cqh_first = (elm); else (head)->cqh_last->field.cqe_next = (elm); (head)->cqh_last = (elm); } while (0)" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef CIRCLEQ_REMOVE" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define CIRCLEQ_REMOVE(head, elm, field) do { if ((elm)->field.cqe_next == (void *)(head)) (head)->cqh_last = (elm)->field.cqe_prev; else (elm)->field.cqe_next->field.cqe_prev = (elm)->field.cqe_prev; if ((elm)->field.cqe_prev == (void *)(head)) (head)->cqh_first = (elm)->field.cqe_next; else (elm)->field.cqe_prev->field.cqe_next = (elm)->field.cqe_next; } while (0)" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          
          echo "#ifndef M_16_SWAP" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define M_16_SWAP(x) (__builtin_bswap16(x))" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef M_32_SWAP" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define M_32_SWAP(x) (__builtin_bswap32(x))" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#ifndef P_32_SWAP" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#define P_32_SWAP(x) (*((uint32_t*)(x)) = __builtin_bswap32(*((uint32_t*)(x))))" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"
          echo "#endif" >> "${{ github.workspace }}/esp32_fix_macros.h"

          echo "=== Parcheando inclusiones relativas directamente en modbtree.c ==="
          # Quitamos el prefijo 'berkeley-db/' porque las cabeceras ya se inyectan en el include path globalmente
          if [ -f "extmod/modbtree.c" ]; then
            sed -i 's#berkeley-db/db.h#db.h#g' extmod/modbtree.c
            sed -i 's#berkeley-db/btree.h#btree.h#g' extmod/modbtree.c
          fi

          echo "=== Inyectando parches forzados en CMake ==="
          echo "" >> extmod/extmod.cmake
          echo "if(TARGET micropy_extmod_btree)" >> extmod/extmod.cmake
          echo "    target_compile_options(micropy_extmod_btree PRIVATE \"-include\" \"${{ github.workspace }}/esp32_fix_macros.h\")" >> extmod/extmod.cmake
          echo "endif()" >> extmod/extmod.cmake
          echo "if(TARGET __idf_main)" >> extmod/extmod.cmake
          echo "    target_compile_options(__idf_main PRIVATE \"-include\" \"${{ github.workspace }}/esp32_fix_macros.h\")" >> extmod/extmod.cmake
          echo "endif()" >> extmod/extmod.cmake
          
          echo "Parche directo sobre fuentes completado."
        fi
        
        # 2. Bypass para micropython-lib en py/mkrules.cmake
        if [ -f "py/mkrules.cmake" ]; then
          sed -i 's/message(FATAL_ERROR.*micropython-lib.*)/message(STATUS "Bypassed micropython-lib error")/g' py/mkrules.cmake
          sed -i 's/message(SEND_ERROR.*micropython-lib.*)/message(STATUS "Bypassed micropython-lib error")/g' py/mkrules.cmake
          sed -i '269s/message(FATAL_ERROR/message(STATUS/g' py/mkrules.cmake 2>/dev/null || true
          echo "Validación de py/mkrules.cmake parcheada."
        fi
        
    - name: Compile Firmware
      run: |
        source ports/esp32/esp-idf/export.sh
        cd ports/esp32
        rm -rf build-ESP32_GENERIC_S3-SPIRAM_OCT
        make -j2 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: micropython-esp32s3-camera-firmware
        path: |
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/bootloader/bootloader.bin
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/partition_table/partition-table.bin
