name: Build ESP32-S3 Octal Camera Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout MicroPython
      uses: actions/checkout@v4
      with:
        repository: 'micropython/micropython'
        fetch-depth: 0

    - name: Checkout Custom Camera Driver
      uses: actions/checkout@v4
      with:
        path: camera-driver

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git pkg-config cmake ninja-build

    - name: Cache ESP-IDF and Tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.espressif
          ports/esp32/esp-idf
        key: ${{ runner.os }}-esp-idf-v5.3-${{ hashFiles('ports/esp32/Makefile') }}

    - name: Install ESP-IDF
      run: |
        # 1. Traer los submódulos base necesarios para el puerto esp32 vía Git de forma directa
        git submodule update --init --recursive ports/esp32/esp-idf
        git submodule update --init --recursive lib/extmod
        
        # 2. Ahora que esp-idf existe físicamente, instalamos sus herramientas de compilación
        cd ports/esp32
        ./esp-idf/install.sh


    - name: Build mpy-cross
      run: |
        make -C mpy-cross

    - name: Patch Framework (Fix Bootloader & JPEG Conflict)
      run: |
        # Evita que el componente esp_jpeg se compile dentro del entorno limitado del Bootloader
        find . -name "CMakeLists.txt" | grep "esp_jpeg" | xargs -I {} sh -c '
          if ! grep -q "BOOTLOADER_BUILD" {}; then
            echo "if(NOT BOOTLOADER_BUILD)" > {}.tmp
            cat {} >> {}.tmp
            echo "endif()" >> {}.tmp
            mv {}.tmp {}
            echo "Parcheado bootloader en: {}"
          fi
        '

    - name: Compile Firmware
      run: |
        # Activar el entorno virtual de ESP-IDF
        source ports/esp32/esp-idf/export.sh
        
        cd ports/esp32
        
        # Compilación controlando los hilos (-j2) para asegurar estabilidad en la RAM de la VM
        make -j2 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT USER_C_MODULES="${{ github.workspace }}/camera-driver/src/micropython.cmake"

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: micropython-esp32s3-camera-firmware
        path: |
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/bootloader/bootloader.bin
          ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/partition_table/partition-table.bin
