name: Build ESP32-S3 Octal Camera Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout MicroPython Base
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/micropython'
        fetch-depth: 0

    - name: Checkout Custom Camera Driver
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/micropython-camera-driver'
        path: micropython-camera-driver

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git pkg-config cmake ninja-build

    - name: Cache ESP-IDF Tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.espressif
        key: ${{ runner.os }}-esp-idf-v5.3-${{ hashFiles('ports/esp32/Makefile') }}

    - name: Install ESP-IDF Tools
      run: |
        cd ports/esp32
        if [ ! -d "esp-idf" ] || [ -z "$(ls -A esp-idf 2>/dev/null)" ]; then
          echo "Clonando ESP-IDF v5.3 de forma manual..."
          rm -rf esp-idf
          git clone -b v5.3 --recursive https://github.com/espressif/esp-idf.git esp-idf
        fi
        ./esp-idf/install.sh

    - name: Build mpy-cross
      run: |
        make -C mpy-cross

    - name: Patch Framework (Fix Bootloader & JPEG Conflict)
      run: |
        # Evita que el componente esp_jpeg se intente compilar dentro del entorno limitado del Bootloader
        find . -name "CMakeLists.txt" | grep "esp_jpeg" | xargs -I {} sh -c '
          if ! grep -q "BOOTLOADER_BUILD" {}; then
            echo "if(NOT BOOTLOADER_BUILD)" > {}.tmp
            cat {} >> {}.tmp
            echo "endif()" >> {}.tmp
            mv {}.tmp {}
            echo "Parcheado bootloader en: {}"
          fi
        '

    - name: Copy Camera Driver to Expected Path
      run: |
        # 1. Asegurar que el directorio de destino esté limpio y vacío
        rm -rf "${{ github.workspace }}/ports/esp32/main/camera_modules"
        mkdir -p "${{ github.workspace }}/ports/esp32/main/camera_modules"
        
        # 2. Copiar únicamente el contenido de 'src' para que los archivos queden en la raíz esperada
        cp -r "${{ github.workspace }}/micropython-camera-driver/src/." "${{ github.workspace }}/ports/esp32/main/camera_modules"
        
        echo "Contenido verificado en camera_modules:"
        ls -la "${{ github.workspace }}/ports/esp32/main/camera_modules"

    - name: Compile Firmware
      run: |
        # 1. Activamos el entorno de herramientas de Espressif
        source ports/esp32/esp-idf/export.sh
        
        cd ports/esp32
        
        # 2. Inicializar los submódulos ligeros del núcleo de MicroPython (como berkeley-db)
        make BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT submodules
        
        # 3. Lanzar la compilación del firmware completo
        make -j2 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT
