name: Build ESP32-S3-EYE Camera Firmware

# Firmware MicroPython + módulo camera (API moderna) para ESP32-S3-EYE.
# Artefacto: micropython-esp32s3-eye-camera / firmware.bin

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout this repo (workflow context)
      uses: actions/checkout@v4
      with:
        path: autonomus

    - name: Checkout MicroPython
      uses: actions/checkout@v4
      with:
        repository: micropython/micropython
        path: micropython
        fetch-depth: 1
        submodules: recursive

    # Driver MicroPython moderno (import camera / from camera import Camera)
    # Incluye submodule esp32-camera y evita el stack viejo de lemariva.
    - name: Checkout micropython-camera-API
      uses: actions/checkout@v4
      with:
        repository: cnadler86/micropython-camera-API
        path: mp_camera_api
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install OS packages
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build ccache \
          git wget flex bison gperf libffi-dev libssl-dev dfu-util libusb-1.0-0 \
          pkg-config python3-venv

    - name: Cache ESP-IDF
      uses: actions/cache@v4
      with:
        path: |
          ~/esp-idf
          ~/.espressif
          !~/.espressif/dist
        key: esp-idf-v5.5.1-${{ runner.os }}

    - name: Install ESP-IDF v5.5.1
      run: |
        if [ ! -f "$HOME/esp-idf/export.sh" ]; then
          git clone --depth 1 --branch v5.5.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          git -C ~/esp-idf submodule update --init --recursive --filter=tree:0
          cd ~/esp-idf && ./install.sh esp32s3
        fi

    - name: Build mpy-cross
      run: make -C micropython/mpy-cross -j$(nproc)

    - name: Prepare MicroPython esp32 port
      run: |
        set -euo pipefail
        source ~/esp-idf/export.sh
        cd micropython/ports/esp32
        make BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT submodules

        # Asegurar que el component manager vea esp32-camera vía EXTRA_COMPONENT_DIRS
        # (el idf_component.yml de mp_camera_api ya declara esp32-camera + esp_new_jpeg).
        echo "=== mp_camera_api idf_component.yml ==="
        cat "${{ github.workspace }}/mp_camera_api/idf_component.yml"

    - name: Compile firmware (S3 OCT + ESP32S3_EYE + camera)
      run: |
        set -euo pipefail
        source ~/esp-idf/export.sh
        cd micropython/ports/esp32

        BOARD=ESP32_GENERIC_S3
        VARIANT=SPIRAM_OCT
        CAM_MODEL=ESP32S3_EYE
        BUILD_DIR="build-${BOARD}-${VARIANT}-${CAM_MODEL}"
        CAM_API="${{ github.workspace }}/mp_camera_api"

        rm -rf "$BUILD_DIR"

        # Misma receta que el CI oficial de cnadler86/micropython-camera-API
        IDF_CMD=(
          idf.py
          -B "$BUILD_DIR"
          -D "MICROPY_BOARD=${BOARD}"
          -D "MICROPY_BOARD_VARIANT=${VARIANT}"
          -D "MICROPY_CAMERA_MODEL=${CAM_MODEL}"
          -D "USER_C_MODULES=${CAM_API}/micropython.cmake"
          -D "EXTRA_COMPONENT_DIRS=${CAM_API}"
          build
        )

        echo "Running: ${IDF_CMD[*]}"
        "${IDF_CMD[@]}"

        # Empaquetar firmware.bin unificado
        python makeimg.py \
          "$BUILD_DIR/sdkconfig" \
          "$BUILD_DIR/bootloader/bootloader.bin" \
          "$BUILD_DIR/partition_table/partition-table.bin" \
          "$BUILD_DIR/micropython.bin" \
          "$BUILD_DIR/firmware.bin" \
          "$BUILD_DIR/micropython.uf2"

        # Verificación: el bin debe contener el módulo camera
        echo "=== Verifying camera symbols in firmware.bin ==="
        if ! strings "$BUILD_DIR/firmware.bin" | grep -E -q 'esp_camera|OV2640|PixelFormat|FrameSize'; then
          echo "ERROR: firmware.bin no contiene símbolos de cámara"
          strings "$BUILD_DIR/firmware.bin" | grep -i cam | head -20 || true
          exit 1
        fi
        echo "Camera symbols OK"
        ls -lh "$BUILD_DIR/firmware.bin"

        # Exponer path al job de upload
        echo "FW_DIR=${{ github.workspace }}/micropython/ports/esp32/${BUILD_DIR}" >> "$GITHUB_ENV"

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: micropython-esp32s3-eye-camera
        path: |
          ${{ env.FW_DIR }}/firmware.bin
          ${{ env.FW_DIR }}/bootloader/bootloader.bin
          ${{ env.FW_DIR }}/partition_table/partition-table.bin
        if-no-files-found: error
