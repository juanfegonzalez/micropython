name: Build ESP32-S3-EYE Camera + AI Firmware

# MicroPython + camera (API moderna) + microlite (TFLite Micro).
# Artefacto: micropython-esp32s3-eye-camera-ai / firmware.bin

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # Repo del proyecto en la raíz del workspace ($GITHUB_WORKSPACE/firmware/...)
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Checkout MicroPython
      uses: actions/checkout@v4
      with:
        repository: micropython/micropython
        path: micropython
        fetch-depth: 1
        submodules: recursive

    - name: Checkout micropython-camera-API
      uses: actions/checkout@v4
      with:
        repository: cnadler86/micropython-camera-API
        path: mp_camera_api
        submodules: recursive

    # Binding MicroPython ↔ TFLite Micro (módulo `microlite`)
    - name: Checkout tensorflow-micropython-examples
      uses: actions/checkout@v4
      with:
        repository: mocleiri/tensorflow-micropython-examples
        path: tflm_mp
        fetch-depth: 1

    - name: Checkout tflm_esp_kernels (pinned by mocleiri)
      uses: actions/checkout@v4
      with:
        repository: espressif/tflite-micro-esp-examples
        path: tflm_mp/tflm_esp_kernels
        # Commit fijado en el submodule de mocleiri (estructura components/tflite-lib)
        ref: 2690c7a7a27164eea6bd7d38e6fec979e7d1b4ec
        submodules: recursive

    - name: Verify USER_C_MODULES wrapper
      run: |
        set -euo pipefail
        MODULES="${{ github.workspace }}/firmware/micropython.cmake"
        echo "Looking for: $MODULES"
        ls -la "${{ github.workspace }}/firmware" || {
          echo "ERROR: falta firmware/ en el repo. Asegúrate de subir firmware/micropython.cmake"
          ls -la "${{ github.workspace }}"
          exit 1
        }
        test -f "$MODULES"

    # Los usermods marcan flags/macros como INTERFACE y se filtran a TODO MicroPython
    # (p.ej. -fno-rtti en .c, -O3 rompe modbluetooth, audio_frontend exige ulab).
    - name: Patch camera + microlite cmake for IDF5
      env:
        CAM_CMAKE: ${{ github.workspace }}/mp_camera_api/micropython.cmake
        ML_CMAKE: ${{ github.workspace }}/tflm_mp/micropython-modules/microlite/micropython.cmake
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import os, re
        from pathlib import Path

        cam = Path(os.environ["CAM_CMAKE"])
        text = cam.read_text()
        text2, n = re.subn(
            r"# Camera module strings.*?MICROPY_ROM_TEXT_COMPRESSION=0\s*\)\s*",
            "# (patched) skip MICROPY_ROM_TEXT_COMPRESSION redefine — breaks MP build\n",
            text,
            count=1,
            flags=re.S,
        )
        if n != 1:
            raise SystemExit(f"camera cmake patch failed (matches={n})")
        cam.write_text(text2)
        print("patched camera cmake")

        ml = Path(os.environ["ML_CMAKE"])
        ml_text = ml.read_text()

        # 1) C++-only flags
        ml_text = ml_text.replace("-fno-rtti", "$<$<COMPILE_LANGUAGE:CXX>:-fno-rtti>")
        ml_text = ml_text.replace("-fno-exceptions", "$<$<COMPILE_LANGUAGE:CXX>:-fno-exceptions>")

        # 2) No subir -O3/-O2 a TODO el firmware (provoca -Werror=stringop-overflow en modbluetooth)
        ml_text, n_o3 = re.subn(r"^\s*-O3\s*$", "    # (patched) removed -O3 leak", ml_text, flags=re.M)
        ml_text, n_o2 = re.subn(r"^\s*-O2\s*$", "    # (patched) removed -O2 leak", ml_text, flags=re.M)
        if n_o3 + n_o2 < 1:
            raise SystemExit("microlite cmake: no -O2/-O3 lines found")

        # 3) Quitar audio_frontend.c (depende de ulab/ndarray.h; no hace falta para person_detect)
        ml_text2, n_af = re.subn(
            r"^[ \t]*\$\{CMAKE_CURRENT_LIST_DIR\}/audio_frontend\.c\s*\n",
            "",
            ml_text,
            flags=re.M,
        )
        if n_af < 1:
            raise SystemExit(f"microlite cmake: audio_frontend.c not removed (matches={n_af})")
        ml_text = ml_text2

        # 4) Extra: no tratar stringop-overflow como error si aún se cuela algo
        if "-Wno-error=stringop-overflow" not in ml_text:
            ml_text = ml_text.replace(
                "-Wno-error=maybe-uninitialized",
                "-Wno-error=maybe-uninitialized\n    -Wno-error=stringop-overflow",
            )

        ml.write_text(ml_text)
        print(f"patched microlite cmake (O removed={n_o2+n_o3}, audio_frontend removed={n_af})")
        PY

        ! grep -q 'MICROPY_ROM_TEXT_COMPRESSION=0' "$CAM_CMAKE"
        ! grep -q 'audio_frontend.c' "$ML_CMAKE"
        ! grep -E -q '^\s*-O3\s*$' "$ML_CMAKE"
        grep -q 'COMPILE_LANGUAGE:CXX>:-fno-rtti' "$ML_CMAKE"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install OS packages
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build ccache \
          git wget flex bison gperf libffi-dev libssl-dev dfu-util libusb-1.0-0 \
          pkg-config python3-venv

    - name: Cache ESP-IDF
      uses: actions/cache@v4
      with:
        path: |
          ~/esp-idf
          ~/.espressif
          !~/.espressif/dist
        key: esp-idf-v5.5.1-${{ runner.os }}

    - name: Install ESP-IDF v5.5.1
      run: |
        if [ ! -f "$HOME/esp-idf/export.sh" ]; then
          git clone --depth 1 --branch v5.5.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          git -C ~/esp-idf submodule update --init --recursive --filter=tree:0
          cd ~/esp-idf && ./install.sh esp32s3
        fi

    - name: Build mpy-cross
      run: make -C micropython/mpy-cross -j$(nproc)

    - name: Prepare MicroPython esp32 port
      run: |
        set -euo pipefail
        source ~/esp-idf/export.sh
        cd micropython/ports/esp32
        make BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT submodules

        echo "=== mp_camera_api idf_component.yml ==="
        cat "${{ github.workspace }}/mp_camera_api/idf_component.yml"
        echo "=== tflite-lib exists? ==="
        ls "${{ github.workspace }}/tflm_mp/tflm_esp_kernels/components/tflite-lib" | head

    - name: Compile firmware (S3 OCT + ESP32S3_EYE + camera + microlite)
      run: |
        set -euo pipefail
        source ~/esp-idf/export.sh
        cd micropython/ports/esp32

        BOARD=ESP32_GENERIC_S3
        VARIANT=SPIRAM_OCT
        CAM_MODEL=ESP32S3_EYE
        BUILD_DIR="build-${BOARD}-${VARIANT}-${CAM_MODEL}-ai"
        CAM_API="${{ github.workspace }}/mp_camera_api"
        TFLM_MP="${{ github.workspace }}/tflm_mp"
        MODULES="${{ github.workspace }}/firmware/micropython.cmake"

        rm -rf "$BUILD_DIR"

        IDF_CMD=(
          idf.py
          -B "$BUILD_DIR"
          -D "MICROPY_BOARD=${BOARD}"
          -D "MICROPY_BOARD_VARIANT=${VARIANT}"
          -D "MICROPY_CAMERA_MODEL=${CAM_MODEL}"
          -D "CAM_API_DIR=${CAM_API}"
          -D "TFLM_MP_DIR=${TFLM_MP}"
          -D "USER_C_MODULES=${MODULES}"
          -D "EXTRA_COMPONENT_DIRS=${CAM_API}"
          build
        )

        echo "Running: ${IDF_CMD[*]}"
        if ! "${IDF_CMD[@]}"; then
          echo "=== idf build failed; last stderr log ==="
          ls -lt "$BUILD_DIR/log" | head
          # Mostrar errores reales (no solo warnings del final)
          grep -E "error:|fatal error:|undefined reference" "$BUILD_DIR/log"/* 2>/dev/null | tail -80 || true
          exit 1
        fi

        python makeimg.py \
          "$BUILD_DIR/sdkconfig" \
          "$BUILD_DIR/bootloader/bootloader.bin" \
          "$BUILD_DIR/partition_table/partition-table.bin" \
          "$BUILD_DIR/micropython.bin" \
          "$BUILD_DIR/firmware.bin" \
          "$BUILD_DIR/micropython.uf2"

        echo "=== Verifying camera + microlite symbols ==="
        if ! strings "$BUILD_DIR/firmware.bin" | grep -E -q 'esp_camera|PixelFormat|FrameSize'; then
          echo "ERROR: faltan símbolos de cámara"
          exit 1
        fi
        if ! strings "$BUILD_DIR/firmware.bin" | grep -E -q 'microlite|TfLite|tflite'; then
          echo "ERROR: faltan símbolos de microlite/tflite"
          strings "$BUILD_DIR/firmware.bin" | grep -i micro | head -30 || true
          exit 1
        fi
        echo "Camera + microlite symbols OK"
        ls -lh "$BUILD_DIR/firmware.bin"

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: micropython-esp32s3-eye-camera-ai
        path: |
          ${{ github.workspace }}/micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT-ESP32S3_EYE-ai/firmware.bin
          ${{ github.workspace }}/micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT-ESP32S3_EYE-ai/bootloader/bootloader.bin
          ${{ github.workspace }}/micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT-ESP32S3_EYE-ai/partition_table/partition-table.bin
        if-no-files-found: error
